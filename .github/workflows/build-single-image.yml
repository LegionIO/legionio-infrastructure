name: Build Single Image

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Packer Init
        working-directory: services/${{ inputs.service }}
        run: packer init .

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull parent image
        env:
          SERVICE: ${{ inputs.service }}
        run: |
          if [ "$SERVICE" = "base" ]; then
            docker pull ruby:3.4-slim
          elif [ "$SERVICE" = "core" ]; then
            docker pull ghcr.io/legionio/legion-base:latest
          else
            docker pull ghcr.io/legionio/legion-core:latest
          fi

      - name: Build image with Packer
        working-directory: services/${{ inputs.service }}
        env:
          VERSION: ${{ inputs.version }}
        run: packer build -var "version=${VERSION}" .

      - name: Derive image name
        id: meta
        env:
          SERVICE: ${{ inputs.service }}
        run: |
          name="legion-${SERVICE##*/}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Push to GHCR
        env:
          NAME: ${{ steps.meta.outputs.name }}
          VERSION: ${{ inputs.version }}
        run: |
          docker push "ghcr.io/legionio/${NAME}:${VERSION}"
          docker push "ghcr.io/legionio/${NAME}:latest"

      - name: Tag and push to Docker Hub
        continue-on-error: true
        env:
          NAME: ${{ steps.meta.outputs.name }}
          VERSION: ${{ inputs.version }}
        run: |
          docker tag "ghcr.io/legionio/${NAME}:${VERSION}" "docker.io/legionio/${NAME}:${VERSION}"
          docker tag "ghcr.io/legionio/${NAME}:latest" "docker.io/legionio/${NAME}:latest"
          docker push "docker.io/legionio/${NAME}:${VERSION}"
          docker push "docker.io/legionio/${NAME}:latest"
