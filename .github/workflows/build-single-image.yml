name: Build Single Image

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Packer Init
        working-directory: services/${{ inputs.service }}
        run: packer init .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull parent image
        env:
          SERVICE: ${{ inputs.service }}
        run: |
          if [ "$SERVICE" = "base" ]; then
            docker pull ruby:3.4-slim
          elif [ "$SERVICE" = "core" ]; then
            docker pull ghcr.io/legionio/legion-base:latest
          else
            docker pull ghcr.io/legionio/legion-core:latest
          fi

      - name: Build and push image
        working-directory: services/${{ inputs.service }}
        env:
          VERSION: ${{ inputs.version }}
        run: packer build -var "version=${VERSION}" .
